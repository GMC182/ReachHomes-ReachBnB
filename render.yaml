services:
  - type: web
    name: reachhomes-reachbnb
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: NODE_ENV=production npx tsx server.ts
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
